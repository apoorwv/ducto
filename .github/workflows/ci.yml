name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[test,postgres,supabase]"
      - run: pyright src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pg_tmp for Postgres integration tests
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-client
          sudo curl -sL -o /usr/local/bin/pg_tmp https://raw.githubusercontent.com/eradman/ephemeralpg/main/pg_tmp
          sudo chmod +x /usr/local/bin/pg_tmp
      - run: pip install -e ".[test,postgres,supabase]"
      - run: pytest

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv build
      - run: uv publish
