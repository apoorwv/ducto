name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff
      - working-directory: python
        run: ruff check src/ tests/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e "python/[test,postgres,supabase]"
      - working-directory: python
        run: pyright src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pg_tmp for Postgres integration tests
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-client
          PG_BIN=$(ls -d /usr/lib/postgresql/*/bin 2>/dev/null | head -1)
          if [ -n "$PG_BIN" ]; then echo "$PG_BIN" >> "$GITHUB_PATH"; fi
          sudo curl -sL -o /usr/local/bin/pg_tmp \
            https://raw.githubusercontent.com/eradman/ephemeralpg/e6631785b1fd189c4d7a5118ec4f3db018a71212/pg_tmp.sh
          sudo chmod +x /usr/local/bin/pg_tmp
      - run: pip install -e "python/[test,postgres,supabase]"
      - working-directory: python
        run: pytest

  js-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: javascript
        run: |
          npm install
          npx vitest run

  js-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - working-directory: javascript
        run: |
          npm install
          npx tsc --noEmit

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, typecheck, test, js-test, js-typecheck]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install uv
      - working-directory: python
        run: |
          uv build
          uv publish
