name: Deploy Docs
on:
  push:
    branches: [main]
    paths: ['docs/**', 'python/**', 'javascript/**', '.github/workflows/docs.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7
      - name: Setup Python (for API docs generation)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python package + Sphinx
        run: |
          pip install -e "../python/"
          pip install sphinx sphinx-markdown-builder
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - name: Install JS package deps (for TypeDoc)
        run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: javascript
      - run: npm run build
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/build
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
