name: Deploy Docs
on:
  push:
    branches: [main]
    paths: ['docs/**', 'python/**', 'javascript/**', '.github/workflows/docs.yml']
  workflow_dispatch:

# Least-privilege: only what GitHub Pages deployment requires. `contents: read`
# to checkout, `pages: write` + `id-token: write` for the Pages OIDC deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancelling an in-flight Pages build is safe (no registry desync), so keep it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Python (for API docs generation)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Install Python package + Sphinx + notebook deps
        run: |
          pip install -e "../python/"
          pip install sphinx sphinx-markdown-builder jupyter nbconvert
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: npm ci
      - name: Install JS package deps (for TypeDoc)
        run: npm ci --ignore-scripts --no-audit --no-fund
        working-directory: javascript
      - run: npm run build
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./docs/build
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
